style:
  LoopWithTooManyJumpStatements:
    active: false
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
      - "100"
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - Preview
      - Composable
  MaxLineLength:
    active: true
    excludes:
      - "**/src/test/**"
      - "**/src/androidTest/**"
naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable
complexity:
  TooManyFunctions:
    excludes:
      - "**/src/test/**"
      - "**/src/androidTest/**"
  LongParameterList:
    ignoreAnnotated:
      - Composable
    excludes:
      - "**/src/test/**"
      - "**/src/androidTest/**"
